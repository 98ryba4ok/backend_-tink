databases:
  - name: cinefind-db
    databaseName: cinefind
    user: cinefind
    plan: free

services:
  - type: web
    name: cinefind-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    buildCommand: ""
    startCommand: >
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      uvicorn cinefind.asgi:application --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cinefind-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://changeme.gitlab.io"
      - key: TMDB_API_KEY
        sync: false
      - key: GIGACHAT_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
