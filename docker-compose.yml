services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: cinefind
      POSTGRES_USER: cinefind
      POSTGRES_PASSWORD: cinefind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinefind -d cinefind"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py makemigrations movies users events recommendations &&
             python manage.py migrate &&
             (python manage.py shell -c \"from apps.movies.models import Movie; exit(0 if Movie.objects.exists() else 1)\" || python manage.py sync_tmdb --pages 10) &&
             uvicorn cinefind.asgi:application --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
